name: Guard protected settings fields

# Runs whenever content.json changes on main.
# Searches the last 20 commits for the most recent non-empty value of each
# protected field (YouTube URL, Download Tracking Prefix, AI-PODCAST PAGE)
# and restores it if the current commit has cleared it.
# This prevents a stale local content.json (e.g. from a "post: Add episode"
# commit that did not pull first) from wiping settings saved via the CMS.

on:
  push:
    branches: [main]
    paths:
      - content.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 22   # need HEAD + up to 20 ancestors to find last non-empty value

      - name: Restore settings if cleared by commit
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, sys

          with open("content.json", encoding="utf-8") as f:
              curr = json.load(f)

          # ── Find the last non-empty value for each protected field ─────
          # Search up to 20 previous commits so that a single stale publish
          # cannot permanently wipe a value that was set in an earlier CMS save.
          def find_last_value(commits, extractor):
              for sha in commits:
                  run = subprocess.run(
                      ["git", "show", f"{sha}:content.json"],
                      capture_output=True, text=True,
                  )
                  if run.returncode != 0:
                      continue
                  try:
                      val = extractor(json.loads(run.stdout))
                      if val:
                          return val
                  except Exception:
                      continue
              return ""

          # Collect up to 20 ancestor SHAs (HEAD^ through HEAD~20)
          log = subprocess.run(
              ["git", "log", "--format=%H", "-20", "HEAD^"],
              capture_output=True, text=True,
          )
          ancestors = log.stdout.split() if log.returncode == 0 else []

          if not ancestors:
              print("No previous commits — nothing to guard.")
              sys.exit(0)

          changed = False

          # 1. YouTube URL  (settings.social.youtube)
          curr_yt = curr.get("settings", {}).get("social", {}).get("youtube", "")
          if not curr_yt:
              best_yt = find_last_value(ancestors, lambda d: d.get("settings", {}).get("social", {}).get("youtube", ""))
              if best_yt:
                  curr.setdefault("settings", {}).setdefault("social", {})["youtube"] = best_yt
                  print(f"  ↩ Restored YouTube URL: {best_yt}")
                  changed = True

          # 2. Download Tracking Prefix  (settings.podcast.trackingPrefix)
          curr_pfx = curr.get("settings", {}).get("podcast", {}).get("trackingPrefix", "")
          if not curr_pfx:
              best_pfx = find_last_value(ancestors, lambda d: d.get("settings", {}).get("podcast", {}).get("trackingPrefix", ""))
              if best_pfx:
                  curr.setdefault("settings", {}).setdefault("podcast", {})["trackingPrefix"] = best_pfx
                  print(f"  ↩ Restored trackingPrefix: {best_pfx}")
                  changed = True

          # 3. AI-PODCAST PAGE  (pages['ai-podcast'])
          curr_ai = curr.get("pages", {}).get("ai-podcast", "")
          if not curr_ai:
              best_ai = find_last_value(ancestors, lambda d: d.get("pages", {}).get("ai-podcast", ""))
              if best_ai:
                  curr.setdefault("pages", {})["ai-podcast"] = best_ai
                  print("  ↩ Restored ai-podcast page content")
                  changed = True

          if not changed:
              print("All protected settings intact — nothing to restore.")
              sys.exit(0)

          with open("content.json", "w", encoding="utf-8") as f:
              json.dump(curr, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print("content.json updated with restored settings.")
          PYEOF

      - name: Commit restored settings (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.json
          if git diff --cached --quiet; then
            echo "No settings were cleared — nothing to commit."
          else
            git commit -m "auto: Restore protected settings cleared by direct commit"
            git push
          fi
